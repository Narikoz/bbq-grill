# ── BBQ GRILL — Nginx reverse proxy ─────────────────────────
#
#   http://localhost/        → Angular dev server  (ng serve :4200)
#   http://localhost/api/    → PHP REST API        (Apache :80 inside container)
#
server {
    listen 80;
    server_name localhost;

    # ── Increase header buffer (PHP session cookies) ──
    large_client_header_buffers 4 32k;
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;

    # ── PHP REST API  (anything under /api/) ──
    location /api/ {
        proxy_pass         http://api/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
        proxy_read_timeout 60s;

        # CORS pre-flight pass-through (PHP handles CORS headers)
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
    }

    # ── Angular dev server with WebSocket support (HMR live-reload) ──
    location /sockjs-node {
        proxy_pass         http://angular:4200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass         http://angular:4200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;     # keep WebSocket alive
    }
}
